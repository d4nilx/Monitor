name: Windows MAUI Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
    
jobs:
    build-windows:
        runs-on: windows-latest
        
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: '10.0.x'

            - name: Install MAUI workload
              run: dotnet workload install maui

            - name: Build Windows app
              run: dotnet publish Monitor.Maui/Monitor.Maui.csproj -f net10.0-windows10.0.19041.0 -c Release -p:CreatePackage=false

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                name: Monitor-Maui-Windows-build
                path: Monitor.Maui/bin/Release/net10.0-windows10.0.19041.0/win10-x64/publish/