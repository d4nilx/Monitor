name: macOS MAUI Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 26.6
        run: sudo xcode-select -s /Applications/Xcode_26.6.app/Contents/Developer

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-maccatalyst

      - name: Restore macOS only
        run: dotnet restore Monitor.Maui/Monitor.Maui.csproj -p:TargetFrameworks=net10.0-maccatalyst

      - name: Build macOS app
        run: dotnet publish Monitor.Maui/Monitor.Maui.csproj -f net10.0-maccatalyst -c Release -p:CreatePackage=false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Monitor-Maui-macOS-build
          path: Monitor.Maui/bin/Release/net10.0-maccatalyst/**/*.app
